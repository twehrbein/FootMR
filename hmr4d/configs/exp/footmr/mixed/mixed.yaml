# @package _global_
defaults:
    - override /data: mocap/trainX_testY
    - override /model: footmr/footmr_pl
    - override /endecoder: footmr/v1_amass_local_bedlam_cam
    - override /optimizer: adamw_2e-4
    - override /scheduler_cfg: epoch_half_200_350
    - override /train_datasets:
          - pure_motion_amass/v11
          - imgfeat_bedlam/v2
          - imgfeat_h36m/v1
          - imgfeat_3dpw/v1
    - override /test_datasets:
          - rich/all
          - moyo/all
          - moof/all
    - override /callbacks:
          - simple_ckpt_saver/every10e
          # - prog_bar/prog_reporter_every0.1
          - train_speed_timer/base
          - lr_monitor/pl
          - metric_rich
          - metric_moyo
          - metric_moof
    - override /network: gvhmr/relative_transformer

job_id: -1
exp_name_base: ${now:%Y-%m-%d}_${now:%H-%M-%S}_${job_id}  # mixed
exp_name_var: DEBUG  # default is debug run, don't use wandb
exp_name: ${exp_name_base}_${exp_name_var}
data_name: train

pipeline:
    _target_: hmr4d.model.footmr.pipeline.footmr_pipeline.Pipeline
    args_denoiser3d: ${network}
    args:
        endecoder_opt: ${endecoder}
        normalize_cam_angvel: True
        weights:
            cr_j3d: 500.
            transl_c: 1.
            cr_verts: 500.
            j2d: 1000.
            verts2d: 1000.

            transl_w: 1.
            static_conf_bce: 1.

        static_conf:
            vel_thr: 0.15

data:
    loader_opts:
        train:
            batch_size: 256
            num_workers: 8

pl_trainer:
    precision: 16-mixed
    log_every_n_steps: 100
    gradient_clip_val: 0.5
    max_epochs: 500
    check_val_every_n_epoch: 10
    devices: 1

logger:
    _target_: pytorch_lightning.loggers.TensorBoardLogger
    save_dir: ${output_dir} # /save_dir/name/version/sub_dir
    name: ""
    version: "tb" # merge name and version
